apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: duni
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/chandana-harish/Duniversity-College-Portal.git
    targetRevision: main
    path: helm-duni
    helm:
      values: |
        userprofile:
          activeVersion: blue
  destination:
    server: https://180C48E2CB31D6D78FC21B5A77FCDB66.gr7.us-east-1.eks.amazonaws.com
    namespace: chandana-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true