version: "3.8"

services:
  frontend:
    image: chandu554/duni:v1.1.0
    container_name: Retail-app12
    ports:
      - "3000:3000"
    env_file:
      - .env
    networks:
      - frontend-net
    depends_on:
      - nginx-proxy

  backend:
    image: mysql:8.0
    container_name: mysql-cont12
    volumes:
      - mysql_data:/var/lib/mysql
    env_file:
      - .env
    networks:
      - backend-net

  nginx-proxy:
    image: nginx:latest
    container_name: nginx-proxy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"   # proxy exposed to host
    networks:
      - frontend-net
      - backend-net
    depends_on:
      - backend

volumes:
  mysql_data:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
