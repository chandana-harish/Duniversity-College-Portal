apiVersion: apps/v1
kind: Deployment
metadata: 
  name: duni-back
  namespace: chandana-ns 
spec:
  replicas: 1
  selector: 
    matchLabels:
      apps: uni
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template: 
    metadata:
      labels:
        apps: uni
    spec: 
      containers:
        - name: mongo-cont 
          image: mongo 
          ports:
            containerPort: 27017
          resources:
            requests: 
              memory: "500Mi"
              cpu: "200m"
            limits:
              memory: "400Mi"
              cpu: "200m"
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: 
                  name: duni-sec
                  key: MARIADB_ROOT_PASSWORD
            - name: DB_USER
              valueFrom:
                secretKeyRef: 
                  name: duni-sec
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: 
                  name: duni-sec
                  key: DB_PASSWORD
            
---
apiVersion: v1 
kind: Service 
metadata:
  name: mongo-ser 
  namespace: chandana-ns
spec:
  selector:
    apps: uni 
  ports:
  - targetPort: 27017
    port: 27017
  type: ClusterIP